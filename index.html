<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: linear-gradient(to right, #ff9a9e, #fecfef);
      padding-top: 50px;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      display: inline-block;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .yes {
      background-color: #28a745;
      color: white;
    }

    .no {
      background-color: #dc3545;
      color: white;
      position: relative;
    }

    button:hover {
      transform: scale(1.1);
    }

    #mainContent {
      display: none;
    }
  </style>
</head>

<body>

<!-- 🔐 LOCK SCREEN -->
<div id="lockScreen" class="box">
  <h2>Hey beautiful ❤️</h2>
  <p>Enter our secret word 😏</p>
  <input type="password" id="pass" placeholder="Hint: something only we know 😉">
  <br><br>
  <button onclick="checkPass()">Unlock 🔓</button>
</div>

<!-- 💘 MAIN CONTENT -->
<div id="mainContent" class="box">
  <h1>So here’s the deal… 😌</h1>

  <p style="font-size:20px;">
    Join me for a trip? ✈️<br><br>
    What can just 2 days away from your family<br>
    get you… with me? 😏❤️
  </p>

  <button type="button" class="yes" onclick="yesClicked()">Yes 💕</button>
  <button type="button" class="no" onmouseover="moveNo(this)">No 😢</button>

  <div id="response" style="margin-top:20px;"></div>
</div>

<script>

  // 🔐 PASSWORD CHECK
  function checkPass() {
    var password = document.getElementById("pass").value;

    if(password === "Shibu") {  // 👈 CHANGE PASSWORD HERE
      document.getElementById("lockScreen").style.display = "none";
      document.getElementById("mainContent").style.display = "block";
    } else {
      alert("Hmm… that’s not it 😜 Try again!");
    }
  }

  // 💕 YES CLICK
  function yesClicked() {
    document.getElementById("response").innerHTML =
      "<h2>That’s my girl 😍</h2>\
       <p>Pack your bags… I’m stealing you for 2 days ❤️</p>\
       <img src='https://i.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif' width='250'>";
  }

  // 😈 RUNAWAY NO BUTTON
  function moveNo(btn) {
    btn.style.position = "absolute";
    btn.style.top = Math.random() * 300 + "px";
    btn.style.left = Math.random() * 300 + "px";
  }

</script>

</body>
</html>
